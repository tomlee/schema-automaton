site_name: Omnist
site_description: One canonical data model for JSON, YAML, TOML, XML, and OML.
site_url: https://omnist.dev/
repo_url: https://github.com/omnist-dev/omnist
repo_name: omnist-dev/omnist
edit_uri: edit/master/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables

nav:
  - Home: README.md
  - Quickstart: quickstart.md
  - Why Omnist: why-omnist.md
  - User guide: guide.md
  - OML: formats/oml.md
  - Schema model & OSD: schema.md
  - A real-life example: example.md
  - API reference: api.md
  - Schema-directed deserialization: deserialization.md
  - Formats:
      - Overview: formats/overview.md
      - JSON: formats/json.md
      - YAML: formats/yaml.md
      - TOML: formats/toml.md
      - XML: formats/xml.md
      - OML: formats/oml.md
  - Design:
      - Document & Schema model: design/model.md
      - OML-Core grammar: design/oml-grammar.md
      - OSD grammar: design/schema-osd-grammar.md
  - Glossary: glossary.md
  - Testing: testing.md
  - Repo layout: layout.md
